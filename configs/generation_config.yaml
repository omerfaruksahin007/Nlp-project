# Generation Configuration
generation:
  # LLM model
  model_name: "gpt2"  # Replace with Turkish model (e.g., 'turkish-gpt2', 'tr-bert-base')
  model_type: "causal"  # 'causal' or 'seq2seq'
  
  # Generation parameters
  max_length: 256
  min_length: 20
  temperature: 0.7
  top_p: 0.95
  top_k: 40
  num_beams: 1  # Use > 1 for beam search
  
  # Resource management
  use_gpu: true
  dtype: "float16"  # 'float32', 'float16', 'bfloat16'
  
  # Paths
  model_dir: "models/generation_model"
  checkpoint_dir: "models/generation_checkpoints"

# Prompt configuration
prompt:
  template: "context_answer"  # Options: 'context_answer', 'chain_of_thought'
  include_citations: true
  cite_format: "markdown"  # 'markdown', 'url', 'text'
  
  # Instructions for context constraint
  context_source_instruction: true
  max_context_length: 1500

# Evaluation
evaluation:
  gold_data_path: "data/gold/test_qa.jsonl"
  metrics: ["exact_match", "f1", "bleu", "rouge"]
  
# Fine-tuning
finetuning:
  enabled: false
  training_data_path: "data/training/qa_pairs.jsonl"
  validation_data_path: "data/gold/dev_qa.jsonl"
  
  epochs: 3
  batch_size: 8
  accumulation_steps: 2
  learning_rate: 5e-5
  
  lora_enabled: true
  lora_rank: 8
  lora_alpha: 16
